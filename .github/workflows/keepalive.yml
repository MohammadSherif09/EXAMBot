name: Keep-alive

# GitHub disables scheduled workflows after 60 days with no repo activity.
# This makes a tiny commit on the 1st of each month so the watcher never sleeps.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive file
        run: |
          date -u > .keepalive
          git config user.name  "morth-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .keepalive
          git commit -m "keep-alive [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
