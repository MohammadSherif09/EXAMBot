name: MOrth Part B Watcher

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). GitHub may delay runs 5-15 min under load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button for testing

# Allow the job to commit the alert-state flag back to the repo.
permissions:
  contents: write

# Never run two checks at once.
concurrency:
  group: morth-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS:  ${{ secrets.EMAIL_RECIPIENTS }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
        run: python monitor.py

      - name: Persist alert state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state 2>/dev/null)" ]; then
            git config user.name  "morth-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state
            git commit -m "record booking-open alert [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
